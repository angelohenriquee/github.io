<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ângelo Henrique</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

body{
    min-height:100vh;
    background:url('fundo.jpg') center center / cover fixed no-repeat;
}

/* ====================================
   FOTO PRINCIPAL
==================================== */

.hero{
    width:100%;
    max-width:900px;
    margin:0 auto;

    opacity:0;
    transform:translateY(-30px);

    animation:heroReveal 1.2s cubic-bezier(.19,1,.22,1) forwards;
}

.hero img{
    width:100%;
    height:auto;
    display:block;
}

/* ====================================
   CONTEÚDO
==================================== */

.content{
    width:90%;
    max-width:700px;
    margin:0 auto;
    padding:36px 0 60px;
}

/* ====================================
   LOGO PNG
==================================== */

.logo-wrap{
    display:flex;
    justify-content:center;
    align-items:center;

    margin-bottom:40px;

    opacity:0;
    transform:translateY(25px);

    animation:nameReveal .9s cubic-bezier(.19,1,.22,1) forwards;
    animation-delay:.3s;
}

.logo-wrap img{
    width:100%;
    max-width:700px;
    height:auto;
    display:block;
}

/* ====================================
   GRID
==================================== */

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

/* ====================================
   BOTÕES
==================================== */

.card{
    position:relative;
    display:block;
    overflow:hidden;
    text-decoration:none;

    opacity:0;
    transform:translateY(40px);

    animation:cardReveal .9s cubic-bezier(.19,1,.22,1) forwards;
}

.card::before{
    content:"";
    display:block;
    padding-top:142.2%;
}

.card-bg{
    position:absolute;
    inset:0;

    background-size:cover;
    background-position:center;

    transition:transform 6s cubic-bezier(.19,1,.22,1);
}

.card:hover .card-bg{
    transform:scale(1.06);
}

.card:active .card-bg{
    transform:scale(1.06);
}

/* ====================================
   GRADIENTE
==================================== */

.card::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    height:42%;

    background:linear-gradient(
        to top,
        rgba(0,0,0,.95),
        rgba(0,0,0,.65),
        rgba(0,0,0,0)
    );

    pointer-events:none;
}

/* ====================================
   TEXTO PNG
==================================== */

.text-wrap{
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    z-index:2;

    overflow:hidden;

    display:flex;
    justify-content:center;

    padding-bottom:22px;
}

.text-wrap img{
    width:95%;
    height:auto;
    display:block;

    opacity:0;
    transform:translateY(80px);

    animation:textReveal 1s cubic-bezier(.19,1,.22,1) forwards;
}

/* ====================================
   IMAGENS
==================================== */

.retratos .card-bg{
    background-image:url('retratos.jpg');
}

.profissional .card-bg{
    background-image:url('profissional.jpg');
}

.aniversario .card-bg{
    background-image:url('aniversario.jpg');
}

.marcas .card-bg{
    background-image:url('marcas.jpg');
}

/* ====================================
   CASCATA
==================================== */

.card:nth-child(1){
    animation-delay:.80s;
}

.card:nth-child(2){
    animation-delay:.95s;
}

.card:nth-child(3){
    animation-delay:1.10s;
}

.card:nth-child(4){
    animation-delay:1.25s;
}

.card:nth-child(1) .text-wrap img{
    animation-delay:1.05s;
}

.card:nth-child(2) .text-wrap img{
    animation-delay:1.20s;
}

.card:nth-child(3) .text-wrap img{
    animation-delay:1.35s;
}

.card:nth-child(4) .text-wrap img{
    animation-delay:1.50s;
}

/* ====================================
   ANIMAÇÕES
==================================== */

@keyframes heroReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes nameReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes cardReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes textReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ====================================
   MOBILE
==================================== */

@media (max-width:480px){

    .content{
        width:92%;
        padding-top:28px;
    }

    .logo-wrap{
        margin-bottom:32px;
    }

    .logo-wrap img{
        max-width:100%;
    }

    .grid{
        gap:14px;
    }

    .text-wrap{
        padding-bottom:18px;
    }

    .text-wrap img{
        width:96%;
    }
}

</style>
</head>

<body>

<section class="hero">
    <img src="angelo.jpg" alt="Ângelo Henrique">
</section>

<main class="content">

    <div class="logo-wrap">
        <img src="logo.png" alt="Ângelo Henrique">
    </div>

    <div class="grid">

        <a class="card retratos"
        href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+de+retratos.&type=phone_number&app_absent=0"
        target="_blank">

            <div class="card-bg"></div>

            <div class="text-wrap">
                <img src="textoretratos.png" alt="">
            </div>

        </a>

        <a class="card profissional"
        href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+imagem+profissional.&type=phone_number&app_absent=0"
        target="_blank">

            <div class="card-bg"></div>

            <div class="text-wrap">
                <img src="textoprofissional.png" alt="">
            </div>

        </a>

        <a class="card aniversario"
        href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+o+meu+anivers%C3%A1rio.&type=phone_number&app_absent=0"
        target="_blank">

            <div class="card-bg"></div>

            <div class="text-wrap">
                <img src="textoaniversario.png" alt="">
            </div>

        </a>

        <a class="card marcas"
        href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+marca.&type=phone_number&app_absent=0"
        target="_blank">

            <div class="card-bg"></div>

            <div class="text-wrap">
                <img src="textomarcas.png" alt="">
            </div>

        </a>

    </div>

</main>

</body>
</html>

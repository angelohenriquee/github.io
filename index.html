<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ângelo Henrique</title>
    <style>
        /* Reset Geral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ededed;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container Principal: largura controlada e proporção guiada pela logo */
        .container {
            width: 100%;
            max-width: 540px; 
            position: relative;
            margin: 0 auto;
        }

        /* IMAGEM MESTRE: O seu arquivo logo.png dita a altura exata do site */
        .master-logo {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 5;
            pointer-events: none; /* Garante que os cliques cheguem aos botões abaixo */
            opacity: 0;
            animation: fadeInPage 1s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
        }

        /* Foto de Perfil travada no Topo Absoluto */
        .perfil-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .perfil-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Grid dos Botões travado na Base Absoluta (respeitando a margem do seu Photoshop) */
        .grid-botoes {
            position: absolute;
            bottom: 5.5%; /* Fixa a distância do fim da tela */
            left: 6.5%; /* Fixa a margem lateral */
            width: 87%; /* Largura proporcional dos botões */
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            z-index: 10;
        }

        /* Bloco do Botão */
        .card-botao {
            position: relative;
            width: 100%;
            padding-top: 142.2%; /* Proporção matemática 1,42 x 2,02 */
            overflow: hidden;
            text-decoration: none;
            opacity: 0;
            transform: translateY(25px);
        }

        /* Entrada em Cascata */
        .card-botao:nth-child(1) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards; }
        .card-botao:nth-child(2) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.75s forwards; }
        .card-botao:nth-child(3) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.9s forwards; }
        .card-botao:nth-child(4) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1.05s forwards; }

        /* Imagem da Foto de Fundo */
        .bg-botao {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* Efeito de Zoom na Foto */
        .card-botao:hover .bg-botao,
        .card-botao:active .bg-botao {
            transform: scale(1.06);
        }

        /* Camada Exata do Texto em PNG */
        .texto-botao-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0;
            animation: fadeInText 0.8s ease-out 1.2s forwards;
            display: flex;
        }

            width

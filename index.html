<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ângelo Henrique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Reset de Margens e Configurações Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ededed;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. SEÇÃO SUPERIOR: Foto de Perfil (FULL-WIDTH e Bleed-to-Bleed) */
        .full-width-portrait {
            width: 100vw; /* Ocupa 100% da largura visível da janela */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: translateY(-20px); /* Animação de cair suavemente de cima */
            animation: fadeInPortrait 1s cubic-bezier(0.25, 1, 0.5, 1) 0.4s forwards;
            position: relative; /* Para garantir que o z-index funcione */
            z-index: 1; /* Foto fica atrás do container de conteúdo principal */
        }

        .perfil-img-full {
            width: 100%; /* Imagem se adapta à largura do container (100vw) */
            height: auto;
            display: block;
            object-fit: cover; /* Garante que a foto preencha o espaço sem distorcer */
        }

        /* 2. SEÇÃO INFERIOR: Container de Conteúdo Centrado (Nome e Botões) */
        .main-content-container {
            width: 100%;
            max-width: 540px; /* Mesma base de 1080px de largura proporcional */
            padding: 0 40px; /* Margem lateral harmônica de 80px proporcional */
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px); /* Animação de subir suavemente de baixo */
            animation: fadeInUpContainer 1s cubic-bezier(0.25, 1, 0.5, 1) 0.7s forwards;
            position: relative; /* Para o z-index */
            z-index: 2; /* Container fica na frente da foto */
            margin-top: 35px; /* Separação suave da foto acima */
            margin-bottom: 60px; /* Espaço na base da página */
        }

        /* Seu Nome em Fonte Real Vetorial */
        .nome-marca {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 24px;
            letter-spacing: 5px; /* Espaçamento elegante entre as letras */
            color: #1a1a1a;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Grid dos Botões (Duas Colunas) */
        .grid-botoes {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px; /* Espaçamento de 40px proporcional */
        }

        /* Estrutura do Botão */
        .card-botao {
            position: relative;
            width: 100%;
            padding-top: 142.2%; /* Proporção matemática exata de 1,42 x 2,02 */
            overflow: hidden;
            text-decoration: none;
            opacity: 0;
            transform: translateY(25px);
        }

        /* Animação Escalonada para os Botões */
        .card-botao:nth-child(1) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1s forwards; }
        .card-botao:nth-child(2) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1.15s forwards; }
        .card-botao:nth-child(3) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1.3s forwards; }
        .card-botao:nth-child(4) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1.45s forwards; }

        /* Foto de Fundo do Botão (Foto da Cliente) */
        .bg-botao {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* Zoom interno suave ao interagir */
        .card-botao:hover .bg-botao,
        .card-botao:active .bg-botao {
            transform: scale(1.06);
        }

        /* Container do Texto em PNG (Travado na Base) */
        .texto-botao-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%; /* O container ocupa todo o botão para criar a máscara de animação */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinha o conteúdo (texto) na base */
            overflow: hidden; /* Importante para criar o efeito de revelação */
            z-index: 2;
            padding-bottom: 25px; /* Controla a distância exata do texto até a borda inferior */
        }

        /* O Texto em PNG que vai escorregar */
        .texto-botao-img {
            width: 85%;
            height: auto;
            display: block;
            pointer-events: none;
            opacity: 0;
            transform: translateY(100%); /* Começa totalmente fora da área visível */
            animation: slideInText 0.8s ease-out 1.8s forwards; /* Animação específica para o texto escorregar */
        }

        /* Definições das Animações (Keyframes) */
        @keyframes fadeInPage {
            to { opacity: 1; }
        }

        @keyframes fadeInPortrait {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUpContainer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animação para o texto escorregar de baixo para cima */
        @keyframes slideInText {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="full-width-portrait">
        <img src="angelo.jpg" alt="Ângelo Henrique" class="perfil-img-full">
    </div>

    <div class="main-content-container">
        
        <h1 class="nome-marca">Ângelo Henrique</h1>

        <div class="grid-botoes">
            
            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+de+retratos.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('retratos.jpg');"></div>
                <div class="texto-botao-container">
                    <img src="textoretratos.png" alt="Para você Retratos" class="texto-botao-img">
                </div>
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+imagem+profissional.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('profissional.jpg');"></div>
                <div class="texto-botao-container">
                    <img src="textoprofissional.png" alt="Para sua imagem Profissional" class="texto-botao-img">
                </div>
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+o+meu+anivers%C3%A1rio.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('aniversario.jpg');"></div>
                <div class="texto-botao-container">
                    <img src="textoaniversario.png" alt="Para celebrar seu Aniversário" class="texto-botao-img">
                </div>
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+marca.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('marcas.jpg');"></div>
                <div class="texto-botao-container">
                    <img src="textomarcas.png" alt="Para sua Marca e Coleção" class="texto-botao-img">
                </div>
            </a>

        </div>

    </div>

</body>
</html>

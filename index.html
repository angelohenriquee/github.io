<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ângelo Henrique</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#ededed url('fundo.jpg') center center / cover fixed;
    min-height:100vh;
    display:flex;
    justify-content:center;
    overflow-x:hidden;

    opacity:0;
    animation:fadeInPage 1.2s cubic-bezier(0.25,1,0.5,1) forwards;
}

/* PRANCHETA 1080x2440 */

.container{
    width:100%;
    max-width:540px;
    position:relative;

    padding-top:225.92%;
}

/* CAMADA BASE */

.conteudo-absoluto{
    position:absolute;
    inset:0;
}

/* FOTO */

.perfil-container{
    position:absolute;

    top:40px;
    left:35px;
    right:35px;

    z-index:1;

    opacity:0;
    transform:translateY(20px);

    animation:fadeInUp 1s cubic-bezier(0.25,1,0.5,1) .4s forwards;
}

.perfil-img{
    width:100%;
    display:block;
}

/* GRID */

.grid-botoes{
    position:absolute;

    top:720px;
    left:35px;
    right:35px;

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;

    z-index:2;
}

/* BOTÕES */

.card-botao{
    position:relative;

    width:100%;
    padding-top:142.2%;

    overflow:hidden;
    text-decoration:none;

    opacity:0;
    transform:translateY(25px);
}

.card-botao:nth-child(1){
    animation:fadeInUp 1s cubic-bezier(0.25,1,0.5,1) 1s forwards;
}

.card-botao:nth-child(2){
    animation:fadeInUp 1s cubic-bezier(0.25,1,0.5,1) 1.15s forwards;
}

.card-botao:nth-child(3){
    animation:fadeInUp 1s cubic-bezier(0.25,1,0.5,1) 1.30s forwards;
}

.card-botao:nth-child(4){
    animation:fadeInUp 1s cubic-bezier(0.25,1,0.5,1) 1.45s forwards;
}

/* FOTO INTERNA */

.bg-botao{
    position:absolute;
    inset:0;

    background-size:cover;
    background-position:center;

    transition:transform 1.2s cubic-bezier(0.25,1,0.5,1);

    z-index:1;
}

.card-botao:hover .bg-botao,
.card-botao:active .bg-botao{
    transform:scale(1.06);
}

/* TEXTO DOS BOTÕES */

.texto-botao-container{
    position:absolute;
    inset:0;

    z-index:2;

    opacity:0;
    display:flex;

    animation:fadeInText .8s ease-out 1.8s forwards;
}

.texto-botao-img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

    pointer-events:none;
}

/* LOGO SOBREPOSTA */

.nome-container{
    position:absolute;
    inset:0;

    pointer-events:none;

    z-index:10;

    opacity:0;
    transform:translateY(15px);

    animation:fadeInUp 1s cubic-bezier(0.25,1,0.5,1) .7s forwards;
}

.nome-img{
    width:100%;
    height:100%;
    display:block;
}

/* ANIMAÇÕES */

@keyframes fadeInPage{
    to{
        opacity:1;
    }
}

@keyframes fadeInUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeInText{
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="conteudo-absoluto">

        <div class="perfil-container">
            <img src="angelo.jpg" alt="Ângelo Henrique" class="perfil-img">
        </div>

        <div class="grid-botoes">

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+de+retratos.&type=phone_number&app_absent=0"
               class="card-botao"
               target="_blank">

                <div class="bg-botao" style="background-image:url('retratos.jpg');"></div>

                <div class="texto-botao-container">
                    <img src="textoretratos.png" class="texto-botao-img">
                </div>

            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+imagem+profissional.&type=phone_number&app_absent=0"
               class="card-botao"
               target="_blank">

                <div class="bg-botao" style="background-image:url('profissional.jpg');"></div>

                <div class="texto-botao-container">
                    <img src="textoprofissional.png" class="texto-botao-img">
                </div>

            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+o+meu+anivers%C3%A1rio.&type=phone_number&app_absent=0"
               class="card-botao"
               target="_blank">

                <div class="bg-botao" style="background-image:url('aniversario.jpg');"></div>

                <div class="texto-botao-container">
                    <img src="textoaniversario.png" class="texto-botao-img">
                </div>

            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+marca.&type=phone_number&app_absent=0"
               class="card-botao"
               target="_blank">

                <div class="bg-botao" style="background-image:url('marcas.jpg');"></div>

                <div class="texto-botao-container">
                    <img src="textomarcas.png" class="texto-botao-img">
                </div>

            </a>

        </div>

    </div>

    <div class="nome-container">
        <img src="logo.png" alt="Ângelo Henrique" class="nome-img">
    </div>

</div>

</body>
</html>

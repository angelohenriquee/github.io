<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ângelo Henrique</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">

<style>

:root{
    --container-width: 480px;
    --gap: 18px;
    --text-color: #1a1a1a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

body{
    font-family:'Poppins',sans-serif;
    background:url('fundo.jpg') center center / cover fixed no-repeat;
    min-height:100vh;
}

/* =========================
   FOTO TOPO 100% LARGURA
========================= */

.hero{
    width:100%;
    aspect-ratio:1080 / 800;
    overflow:hidden;

    opacity:0;
    transform:translateY(-35px);

    animation:heroReveal 1.2s cubic-bezier(.22,.61,.36,1) forwards;
}

.hero img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
}

/* =========================
   CONTEÚDO CENTRAL
========================= */

.content{
    width:90%;
    max-width:var(--container-width);
    margin:0 auto;
    padding:34px 0 60px;
}

/* =========================
   NOME
========================= */

.brand{
    text-align:center;
    font-size:22px;
    color:var(--text-color);
    letter-spacing:5px;
    font-weight:400;
    margin-bottom:36px;

    opacity:0;
    transform:translateY(28px);

    animation:nameReveal 1s ease forwards;
    animation-delay:.35s;
}

/* =========================
   GRID
========================= */

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:var(--gap);
}

/* =========================
   BOTÕES
========================= */

.card{
    position:relative;
    display:block;
    width:100%;
    overflow:hidden;
    text-decoration:none;

    opacity:0;
    transform:translateY(45px);

    animation:cardReveal .95s cubic-bezier(.22,.61,.36,1) forwards;
}

.card::before{
    content:"";
    display:block;
    padding-top:142.2%;
}

/* camada da foto */

.card-bg{
    position:absolute;
    inset:0;

    background-size:cover;
    background-position:center;

    transition:
        transform 4.5s cubic-bezier(.22,.61,.36,1);
}

/* hover desktop */

.card:hover .card-bg{
    transform:scale(1.06);
}

/* touch mobile */

.card:active .card-bg{
    transform:scale(1.06);
}

/* =========================
   PNG TEXTO
========================= */

.text-wrap{
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    overflow:hidden;

    display:flex;
    justify-content:center;

    padding-bottom:22px;
}

.text-wrap img{
    width:80%;
    height:auto;
    display:block;

    opacity:0;
    transform:translateY(90px);

    animation:textReveal 1s cubic-bezier(.22,.61,.36,1) forwards;
}

/* =========================
   IMAGENS
========================= */

.retratos .card-bg{
    background-image:url('retratos.jpg');
}

.profissional .card-bg{
    background-image:url('profissional.jpg');
}

.aniversario .card-bg{
    background-image:url('aniversario.jpg');
}

.marcas .card-bg{
    background-image:url('marcas.jpg');
}

/* =========================
   CASCATA
========================= */

.card:nth-child(1){
    animation-delay:.80s;
}

.card:nth-child(2){
    animation-delay:.95s;
}

.card:nth-child(3){
    animation-delay:1.10s;
}

.card:nth-child(4){
    animation-delay:1.25s;
}

.card:nth-child(1) .text-wrap img{
    animation-delay:1.05s;
}

.card:nth-child(2) .text-wrap img{
    animation-delay:1.20s;
}

.card:nth-child(3) .text-wrap img{
    animation-delay:1.35s;
}

.card:nth-child(4) .text-wrap img{
    animation-delay:1.50s;
}

/* =========================
   ANIMAÇÕES
========================= */

@keyframes heroReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes nameReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes cardReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes textReveal{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   RESPONSIVO EXTRA
========================= */

@media (max-width:420px){

    .brand{
        font-size:20px;
        letter-spacing:4px;
        margin-bottom:30px;
    }

    .grid{
        gap:14px;
    }
}

</style>
</head>

<body>

    <!-- FOTO TOPO -->

    <section class="hero">
        <img src="angelo.jpg" alt="Ângelo Henrique">
    </section>

    <!-- CONTEÚDO -->

    <main class="content">

        <h1 class="brand">ÂNGELO HENRIQUE</h1>

        <div class="grid">

            <!-- RETRATOS -->

            <a
                class="card retratos"
                href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+de+retratos.&type=phone_number&app_absent=0"
                target="_blank"
            >
                <div class="card-bg"></div>

                <div class="text-wrap">
                    <img src="textoretratos.png" alt="">
                </div>
            </a>

            <!-- PROFISSIONAL -->

            <a
                class="card profissional"
                href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+imagem+profissional.&type=phone_number&app_absent=0"
                target="_blank"
            >
                <div class="card-bg"></div>

                <div class="text-wrap">
                    <img src="textoprofissional.png" alt="">
                </div>
            </a>

            <!-- ANIVERSÁRIO -->

            <a
                class="card aniversario"
                href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+o+meu+anivers%C3%A1rio.&type=phone_number&app_absent=0"
                target="_blank"
            >
                <div class="card-bg"></div>

                <div class="text-wrap">
                    <img src="textoaniversario.png" alt="">
                </div>
            </a>

            <!-- MARCAS -->

            <a
                class="card marcas"
                href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+marca.&type=phone_number&app_absent=0"
                target="_blank"
            >
                <div class="card-bg"></div>

                <div class="text-wrap">
                    <img src="textomarcas.png" alt="">
                </div>
            </a>

        </div>

    </main>

</body>
</html>

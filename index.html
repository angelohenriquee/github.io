<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ângelo Henrique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">
    
    <style>
        /* Reset e Configurações Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ededed;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased; /* Garante a suavidade editorial da fonte */
        }

        /* 1. SEÇÃO DA FOTO: Proporção exata 1080x800 e largura total */
        .header-image-container {
            width: 100%;
            max-width: 1080px; /* Limite máximo para telas gigantes */
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: translateY(-15px);
            animation: fadeInPortrait 1s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
        }

        .perfil-img {
            width: 100%;
            aspect-ratio: 1080 / 800; /* Crava a proporção exata no navegador */
            object-fit: cover;
            display: block;
        }

        /* 2. SEÇÃO DE CONTEÚDO: Margens para ficar mais estreito que a foto */
        .content-container {
            width: 90%; /* Força os botões a serem sempre menores que a largura da foto */
            max-width: 480px; /* Mantém contido em telas maiores */
            margin: 0 auto;
            padding: 40px 0 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Nome em Fonte Real Vetorial */
        .nome-marca {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 22px;
            letter-spacing: 5px;
            color: #1a1a1a;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 45px;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
        }

        /* Grid dos Botões */
        .grid-botoes {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px; 
        }

        /* Estrutura do Botão */
        .card-botao {
            position: relative;
            width: 100%;
            padding-top: 142.2%; 
            overflow: hidden;
            text-decoration: none;
            opacity: 0;
            transform: translateY(25px);
        }

        /* Animação em Cascata */
        .card-botao:nth-child(1) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.8s forwards; }
        .card-botao:nth-child(2) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.95s forwards; }
        .card-botao:nth-child(3) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1.1s forwards; }
        .card-botao:nth-child(4) { animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 1.25s forwards; }

        /* Fundo do Botão */
        .bg-botao {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        .card-botao:hover .bg-botao,
        .card-botao:active .bg-botao {
            transform: scale(1.06);
        }

        /* Container do Texto em Fonte Real (Travado na Base) */
        .texto-botao-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            text-align: center;
            padding: 0 10px 22px 10px; /* Controla o respiro exato do fundo */
            z-index: 2;
            color: #ffffff;
            opacity: 0;
            transform: translateY(10px);
            animation: slideInText 0.8s ease-out 1.5s forwards;
        }

        /* Estilização das Linhas (Poppins Regular 400 em ambas) */
        .txt-linha1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 13.5px; /* Simula a leitura visual da primeira linha */
            line-height: 1.2;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .txt-linha2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 16.5px; /* Simula o destaque da segunda linha sem mudar o peso */
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        /* Keyframes */
        @keyframes fadeInPortrait {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInText {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header-image-container">
        <img src="angelo.jpg" alt="Ângelo Henrique" class="perfil-img">
    </div>

    <div class="content-container">
        
        <h1 class="nome-marca">Ângelo Henrique</h1>

        <div class="grid-botoes">
            
            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+de+retratos.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('retratos.jpg');"></div>
                <div class="texto-botao-container">
                    <span class="txt-linha1">Para você</span>
                    <span class="txt-linha2">Retratos</span>
                </div>
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+imagem+profissional.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('profissional.jpg');"></div>
                <div class="texto-botao-container">
                    <span class="txt-linha1">Para sua imagem</span>
                    <span class="txt-linha2">Profissional</span>
                </div>
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+o+meu+anivers%C3%A1rio.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('aniversario.jpg');"></div>
                <div class="texto-botao-container">
                    <span class="txt-linha1">Para celebrar seu</span>
                    <span class="txt-linha2">Aniversário</span>
                </div>
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5531972055172&text=Ol%C3%A1+%C3%82ngelo%2C+gostaria+de+saber+mais+sobre+uma+sess%C3%A3o+para+minha+marca.&type=phone_number&app_absent=0" class="card-botao" target="_blank">
                <div class="bg-botao" style="background-image: url('marcas.jpg');"></div>
                <div class="texto-botao-container">
                    <span class="txt-linha1">Para sua</span>
                    <span class="txt-linha2">Marca e Coleção</span>
                </div>
            </a>

        </div>

    </div>

</body>
</html>
